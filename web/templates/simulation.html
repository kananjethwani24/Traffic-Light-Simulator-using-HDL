<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulation - Traffic Light Controller</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Fira+Code:wght@400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .sim-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            height: calc(100vh - 180px);
        }

        .code-panel,
        .output-panel {
            background: rgba(20, 20, 31, 0.9);
            border: 1px solid var(--grid-color);
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            background: rgba(0, 240, 255, 0.1);
            padding: 10px 15px;
            border-bottom: 1px solid var(--grid-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-title {
            color: var(--accent-color);
            font-weight: bold;
            font-size: 0.9em;
        }

        .code-content {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            font-family: 'Fira Code', monospace;
            font-size: 0.85em;
            color: #d4d4d4;
            white-space: pre-wrap;
            background: #1e1e1e;
        }

        .console-output {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            font-family: 'Fira Code', monospace;
            font-size: 0.9em;
            color: #44FF44;
            background: #000;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: #aaa;
            cursor: pointer;
            padding: 5px 10px;
            font-family: 'Orbitron', sans-serif;
            border-bottom: 2px solid transparent;
        }

        .tab-btn.active {
            color: #fff;
            border-bottom: 2px solid var(--accent-color);
        }

        .run-btn {
            background: var(--accent-color);
            color: #000;
            border: none;
            padding: 5px 15px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
        }

        .download-btn {
            background: transparent;
            border: 1px solid var(--text-color);
            color: var(--text-color);
            padding: 5px 10px;
            text-decoration: none;
            font-size: 0.8em;
            margin-right: 10px;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>VERILOG_SIMULATION</h1>
            <nav class="nav-bar">
                <a href="/">HOME</a>
                <a href="/dashboard">DASHBOARD</a>
                <a href="/analytics">ANALYTICS</a>
                <a href="/simulation" class="active">SIMULATION</a>
                <a href="/settings">SETTINGS</a>
            </nav>
        </header>

        <div class="sim-grid">
            <div class="code-panel">
                <div class="panel-header">
                    <div>
                        <button class="tab-btn active" onclick="showCode('controller')">CONTROLLER.V</button>
                        <button class="tab-btn" onclick="showCode('testbench')">TESTBENCH.V</button>
                    </div>
                </div>
                <div id="code-viewer" class="code-content">LOADING_SOURCE_CODE...</div>
            </div>

            <div class="output-panel">
                <div class="panel-header">
                    <span class="panel-title">SIMULATION_CONSOLE</span>
                    <div>
                        <a href="/download/vcd" class="download-btn" target="_blank">DOWNLOAD_VCD</a>
                        <button class="download-btn" onclick="launchGTKWave()"
                            style="background: transparent; color: var(--accent-color); border: 1px solid var(--accent-color); cursor: pointer;">OPEN_IN_VSCODE_(WAVETRACE)</button>
                        <button class="run-btn" onclick="runSimulation()">RUN_SIMULATION</button>
                    </div>
                </div>
                <div id="console-output" class="console-output">READY_TO_EXECUTE...</div>
            </div>
            <div
                style="grid-column: 1 / -1; background: #000; border: 1px solid var(--grid-color); padding: 15px; border-radius: 5px;">
                <h3 style="color: var(--accent-color); margin-top: 0;">VISUAL_TIMING_DIAGRAM (GTKWave Style)</h3>
                <div style="height: 400px; width: 100%;">
                    <canvas id="simWaveformChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        let codeData = {};
        let simChart;

        // Fetch Verilog Code on Load
        fetch('/api/verilog/code')
            .then(res => res.json())
            .then(data => {
                codeData = data;
                showCode('controller');
            })
            .catch(err => {
                document.getElementById('code-viewer').innerText = "ERROR_LOADING_CODE: " + err;
            });

        function showCode(type) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if (type === 'controller') {
                document.querySelector('button[onclick*="controller"]').classList.add('active');
            } else {
                document.querySelector('button[onclick*="testbench"]').classList.add('active');
            }
            document.getElementById('code-viewer').innerText = codeData[type] || 'NO_DATA';
        }

        function runSimulation() {
            const consoleDiv = document.getElementById('console-output');
            consoleDiv.innerText = "EXECUTING_IVERILOG...\nPLEASE_WAIT...";

            fetch('/api/verilog/run', { method: 'POST' })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        consoleDiv.innerText = "SIMULATION_SUCCESSFUL:\n\n" + data.output;
                        parseAndVisualize(data.output);
                    } else {
                        consoleDiv.innerText = "SIMULATION_FAILED:\n\n" + data.output;
                        consoleDiv.style.color = "#FF4444";
                    }
                })
                .catch(err => {
                    consoleDiv.innerText = "NETWORK_ERROR: " + err;
                    consoleDiv.style.color = "#FF4444";
                });
        }

        function launchGTKWave() {
            fetch('/api/verilog/gtkwave', { method: 'POST' })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        alert("Opened in VS Code! Please check the Wavetrace extension.");
                    } else {
                        alert("Error launching VS Code: " + data.error);
                    }
                })
                .catch(err => alert("Network Error: " + err));
        }

        function parseAndVisualize(output) {
            console.log("Parsing simulation output...");
            const lines = output.split('\n');
            const data = [];
            let currentStep = {
                time: null,
                N_R: 0, N_Y: 0, N_G: 0,
                S_R: 0, S_Y: 0, S_G: 0,
                E_R: 0, E_Y: 0, E_G: 0,
                W_R: 0, W_Y: 0, W_G: 0
            };

            lines.forEach(line => {
                const timeMatch = line.match(/Time:\s*(\d+)\s*ns/);
                if (timeMatch) currentStep.time = parseInt(timeMatch[1]);

                ['N', 'S', 'E', 'W'].forEach(dir => {
                    const match = line.match(new RegExp(`${dir}:\\s*\\[([RYG])\\]`));
                    if (match) {
                        const val = match[1];
                        currentStep[`${dir}_R`] = 0;
                        currentStep[`${dir}_Y`] = 0;
                        currentStep[`${dir}_G`] = 0;
                        currentStep[`${dir}_${val}`] = 1;
                    }
                });

                if (line.includes('---') || line.includes('Time:')) {
                    if (currentStep.time !== null) {
                        data.push({ ...currentStep });
                    }
                }
            });

            console.log("Parsed steps:", data.length);
            if (data.length > 0) {
                renderChart(data);
            } else {
                console.error("No valid simulation data found in output.");
                document.getElementById('console-output').innerText += "\n\n[!] ERROR: No visual data could be parsed from the simulation output.";
            }
        }

        function renderChart(data) {
            const ctx = document.getElementById('simWaveformChart').getContext('2d');

            if (simChart) simChart.destroy();

            const labels = data.map(d => d.time);

            // Create datasets. 
            // We want them stacked. Total 12 signals.
            // visual offset: index * 1.5 (spacing)

            const signalNames = [
                'N_R', 'N_Y', 'N_G',
                'S_R', 'S_Y', 'S_G',
                'E_R', 'E_Y', 'E_G',
                'W_R', 'W_Y', 'W_G'
            ];

            // Reverse so top is N_R
            // signalNames.reverse(); // Actually, typically N_R at top is index 11? 
            // Let's decide Y-axis: 0 at bottom.
            // So N_R should be at highest Y.

            const datasets = [];

            // Map labels to y-values for ticks
            const yTicks = {};

            signalNames.forEach((sig, index) => {
                // index 0 -> y=0. index 11 -> y=22 (if spacing 2)
                const offset = (signalNames.length - 1 - index) * 1.5;
                yTicks[offset + 0.5] = sig.replace('_', '-');

                datasets.push({
                    label: sig,
                    data: data.map(d => d[sig] === 1 ? offset + 1 : offset), // Digital: 0->offset, 1->offset+1
                    borderColor: '#00FF00', // GTKWave Green
                    borderWidth: 1.5,
                    pointRadius: 0,
                    fill: false,
                    tension: 0,
                    stepped: true
                });
            });

            simChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: false,
                    layout: { padding: { left: 10, right: 10, top: 10, bottom: 10 } },
                    scales: {
                        y: {
                            min: -0.5,
                            max: (signalNames.length * 1.5),
                            grid: {
                                color: '#333',
                                drawBorder: false
                            },
                            ticks: {
                                callback: function (value) {
                                    // fuzzy match for float issues
                                    for (let k in yTicks) {
                                        if (Math.abs(value - k) < 0.2) return yTicks[k];
                                    }
                                    return null;
                                },
                                color: '#fff',
                                font: { family: 'Fira Code', size: 10 },
                                autoSkip: false
                            }
                        },
                        x: {
                            grid: {
                                color: '#333'
                            },
                            ticks: {
                                color: '#fff',
                                font: { family: 'Fira Code' }
                            },
                            title: {
                                display: true,
                                text: 'Time (ns)',
                                color: '#aaa'
                            }
                        }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            enabled: true,
                            mode: 'index',
                            intersect: false,
                            backgroundColor: 'rgba(0,0,0,0.8)',
                            titleFont: { family: 'Fira Code' },
                            bodyFont: { family: 'Fira Code' }
                        }
                    }
                }
            });
        }
    </script>
</body>

</html>
