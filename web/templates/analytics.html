<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - Traffic Light Controller</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="container">
        <header>
            <h1>ANALYTICS_MODULE</h1>
            <nav class="nav-bar">
                <a href="/">HOME</a>
                <a href="/dashboard">DASHBOARD</a>
                <a href="/analytics" class="active">ANALYTICS</a>
                <a href="/simulation">SIMULATION</a>
                <a href="/settings">SETTINGS</a>
            </nav>
        </header>

        <div class="main-grid">
            <div class="panel-section">
                <h2>EMERGENCY_LOG</h2>
                <table class="data-table" id="emerg-log-table">
                    <thead>
                        <tr>
                            <th>TIME</th>
                            <th>DIRECTION</th>
                            <th>TYPE</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Data populated by JS -->
                    </tbody>
                </table>
            </div>

            <div class="panel-section">
                <h2>SYSTEM_METRICS</h2>
                <div class="metric-box">
                    <h3>TOTAL_CYCLES</h3>
                    <div class="metric-value" id="total-cycles">0</div>
                </div>
                <div class="metric-box">
                    <h3>AVG_WAIT_TIME</h3>
                    <div class="metric-value" id="avg-wait">0s</div>
                </div>
            </div>

            <div class="panel-section" style="grid-column: 1 / -1;">
                <h2>DIGITAL_WAVEFORM_ANALYSIS</h2>
                <div style="height: 300px; width: 100%;">
                    <canvas id="waveformChart"></canvas>
                </div>
            </div>
        </div>
    </div>
    <script>
        let waveformChart;
        // Y-axis offsets for digital signals to stack them
        const signalOffsets = {
            'emerg': 7,
            'ew_r': 6, 'ew_y': 5, 'ew_g': 4,
            'ns_r': 3, 'ns_y': 2, 'ns_g': 1
        };
        const signalLabels = {
            8: '',
            7: 'EMERGENCY',
            6: 'EW_RED', 5: 'EW_YELLOW', 4: 'EW_GREEN',
            3: 'NS_RED', 2: 'NS_YELLOW', 1: 'NS_GREEN',
            0: ''
        };
        const signalColors = {
            'emerg': '#FF0000',
            'ew_r': '#FF0000', 'ew_y': '#FFFF00', 'ew_g': '#00FF00',
            'ns_r': '#FF4444', 'ns_y': '#FFFF44', 'ns_g': '#44FF44'
        };

        function initWaveform() {
            const ctx = document.getElementById('waveformChart').getContext('2d');
            waveformChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: []
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: false,
                    scales: {
                        x: {
                            grid: { color: '#333' },
                            ticks: { color: '#aaa', maxTicksLimit: 10 }
                        },
                        y: {
                            min: 0,
                            max: 8.5,
                            grid: { color: '#333' },
                            ticks: {
                                color: '#00F0FF', // Cyberpunk blue
                                font: { family: 'Orbitron', size: 10 },
                                callback: function (value) { return signalLabels[Math.floor(value)] || ''; },
                                stepSize: 1
                            }
                        }
                    },
                    plugins: {
                        legend: { display: false }
                    },
                    elements: {
                        line: { tension: 0, stepped: true, borderWidth: 2 },
                        point: { radius: 0 }
                    }
                }
            });
        }

        function updateWaveform(history) {
            if (!history || history.length === 0) return;
            if (!waveformChart) initWaveform();

            const labels = history.map(h => h.time);
            const datasets = [];

            // Create datasets for each signal
            Object.keys(signalOffsets).forEach(key => {
                const offset = signalOffsets[key];
                const data = history.map(h => {
                    const val = h[key];
                    // If high, plot at offset + 0.6, else at offset
                    return val === 1 ? offset + 0.6 : offset;
                });

                datasets.push({
                    label: key,
                    data: data,
                    borderColor: signalColors[key],
                    backgroundColor: signalColors[key],
                    fill: false
                });
            });

            waveformChart.data.labels = labels;
            waveformChart.data.datasets = datasets;
            waveformChart.update('none'); // Update without full re-render
        }

        function loadAnalytics() {
            fetch('/api/history')
                .then(res => res.json())
                .then(data => {
                    // Update Log
                    const tbody = document.querySelector('#emerg-log-table tbody');
                    if (tbody && data.emergency_log) {
                        tbody.innerHTML = '';
                        data.emergency_log.forEach(entry => {
                            const row = `<tr>
                                <td>${entry.time}</td>
                                <td>${entry.dir}</td>
                                <td>${entry.type}</td>
                            </tr>`;
                            tbody.innerHTML += row;
                        });
                    }

                    // Update Metrics
                    if (document.getElementById('total-cycles')) document.getElementById('total-cycles').innerText = data.total_cycles;
                    if (document.getElementById('avg-wait')) document.getElementById('avg-wait').innerText = data.avg_wait + 's';

                    // Update Waveform
                    if (data.waveform) {
                        updateWaveform(data.waveform);
                    }
                });
        }
        window.onload = loadAnalytics;
        setInterval(loadAnalytics, 1000); // 1Hz update for waveform
    </script>
</body>

</html>
